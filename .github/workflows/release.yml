name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: amd64
            binary: fox
            archive_ext: tar.gz
          - goos: darwin
            goarch: arm64
            binary: fox
            archive_ext: tar.gz
          - goos: linux
            goarch: amd64
            binary: fox
            archive_ext: tar.gz
          - goos: linux
            goarch: arm64
            binary: fox
            archive_ext: tar.gz
          - goos: windows
            goarch: amd64
            binary: fox.exe
            archive_ext: zip
          - goos: windows
            goarch: arm64
            binary: fox.exe
            archive_ext: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          set -euo pipefail
          mkdir -p dist
          go build -trimpath -ldflags="-s -w" -o "dist/${{ matrix.binary }}" ./cmd/fox

      - name: Package
        run: |
          set -euo pipefail
          artifact="fox_${GITHUB_REF_NAME}_${{ matrix.goos }}_${{ matrix.goarch }}"
          if [ "${{ matrix.archive_ext }}" = "zip" ]; then
            (cd dist && zip -9 "../${artifact}.zip" "${{ matrix.binary }}")
            shasum -a 256 "${artifact}.zip" > "${artifact}.zip.sha256"
          else
            tar -C dist -czf "${artifact}.tar.gz" "${{ matrix.binary }}"
            shasum -a 256 "${artifact}.tar.gz" > "${artifact}.tar.gz.sha256"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fox-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            fox_${{ github.ref_name }}_${{ matrix.goos }}_${{ matrix.goarch }}.${{ matrix.archive_ext }}
            fox_${{ github.ref_name }}_${{ matrix.goos }}_${{ matrix.goarch }}.${{ matrix.archive_ext }}.sha256
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" release-assets/* --clobber
          else
            gh release create "$TAG" release-assets/* \
              --title "$TAG" \
              --generate-notes \
              --verify-tag
          fi
